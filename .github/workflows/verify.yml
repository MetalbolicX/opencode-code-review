name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run for the same ref when a new commit lands so the
# newest push/PR supersedes stale workflow runs instead of stacking them.
concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: pnpm verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 22 LTS: matches the runtime used to author the lockfile and
      # avoids version drift between local verify runs and CI.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # pnpm 9 is required by lockfileVersion: '9.0' in pnpm-lock.yaml;
      # pinning here keeps CI deterministic regardless of the runner image.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verification gate
        run: pnpm verify
